services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: smartstore_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - smartstore_network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: smartstore_ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - smartstore_network
    restart: unless-stopped
    # Uncomment the lines below to enable hardware acceleration with GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  minio:
    image: minio/minio:latest
    container_name: smartstore_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: smartstorepassword123
    volumes:
      - minio_data:/data
    networks:
      - smartstore_network
    command: server /data --console-address ":9001"
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: smartstore_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: smartdbpassword123
      POSTGRES_DB: smartstore
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - smartstore_network
    restart: unless-stopped

volumes:
  qdrant_data:
  ollama_data:
  minio_data:
  postgres_data:

networks:
  smartstore_network:
    driver: bridge